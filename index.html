<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Test</title>
</head>

<body>
    <h3>Sharing undef chain</h3>
    <p>
        #%#//scriptlet('set-constant', 'chained.property.targetA', 'true');
    </p>
    <p>
        #%#//scriptlet('set-constant', 'chained.property.targetB', '10');
    </p>
    <h4> Code: </h4>
    <p>
        setTimeout(() => {
            window.chained = { property: {} };
            console.log('Chain is set');
        }, 5000);
    </p>
    <script>
        setTimeout(() => {
            window.chained = { property: {} };
            console.log('Chain is set');
        }, 5000);

        setTimeout(() => {
            const resultH = document.createElement('h4');
            resultH.innerText = 'Result';
            const res = document.createElement('p');
            res.innerText = `
                window.chained.targetA: ${window.chained.property.targetA},
                window.chained.targetB: ${window.chained.property.targetB},
            `;
            document.body.append(resultH);
            document.body.append(res);
        }, 5500);
    </script>
</body>

</html>
